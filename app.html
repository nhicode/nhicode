<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clien | chisato</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0d1117; --bg-darker: #161b22; --bg-card: rgba(28, 33, 40, 0.85);
            --neon-green: #00ff41; --neon-pink: #ff79c6; --neon-orange: #ffb86c;
            --text-gray: #c9d1d9; --text-dim: #8b949e; --border-color: #30363d;
        }

        body { font-family: 'JetBrains Mono', monospace; background: var(--bg-dark); color: var(--text-gray); min-height: 100vh; overflow-x: hidden; display: flex; justify-content: center; align-items: flex-start; padding: 40px 15px; position: relative; }
        
        /* MƯA TUYẾT (Thưa, nhẹ máy) */
        .snow-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .snowflake { position: absolute; top: -10px; color: var(--neon-green); pointer-events: none; animation: fall linear infinite; opacity: 0.4; font-size: 12px; }
        @keyframes fall { to { transform: translateY(105vh) translateX(20px) rotate(360deg); } }

        /* ==========================================
           VIỀN CONTAINER NỬA XANH NỬA HỒNG (TĨNH)
           ========================================== */
        .container { 
            width: 100%; max-width: 500px; padding: 30px; text-align: center; 
            background: transparent; 
            border: 2px solid transparent;
            border-radius: 12px; 
            background-image: linear-gradient(var(--bg-dark), var(--bg-dark)), 
                              linear-gradient(135deg, var(--neon-green), var(--neon-pink));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            position: relative; z-index: 100; opacity: 0; transform: translateY(20px); transition: 1s; 
        }
        .loaded .container { opacity: 1; transform: translateY(0); }
        .card-video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.35); border-radius: 10px; }

        .profile, .links-wrapper, .code-separator, .chat-widget { position: relative; z-index: 10; }
        
        /* AVATAR VIỀN XANH LÁ */
        .header-icon { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid var(--neon-green); animation: float 4s ease-in-out infinite; margin: 0 auto 20px; display: block; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        /* ==========================================
           TEXT NỬA XANH NỬA HỒNG (TĨNH) ĐÃ ĐƯỢC FIX LỖI
           ========================================== */
        h1, .subtitle, .code-separator, .loader-text, .link-text {
            background: linear-gradient(90deg, var(--neon-green), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* KHẮC PHỤC LỖI TÀNG HÌNH CHỮ Ở NÚT BẤM BẰNG INLINE-BLOCK */
        .link-text { display: inline-block; }

        h1 { font-size: 2rem; margin: 15px auto 10px; display: inline-block; }
        h1::after { content: '_'; animation: blink 1s infinite; margin-left: 5px; color: var(--neon-green); -webkit-text-fill-color: var(--neon-green); }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        
        .subtitle { font-size: 0.9rem; margin-bottom: 20px; display: inline-block;}
        .subtitle::before { content: '// '; -webkit-text-fill-color: var(--neon-pink); }
        .code-separator { margin: 25px 0; text-align: center; font-size: 0.85rem; opacity: 0.8; display: block; }

        /* NÚT BẤM LINK - ĐÃ TÁCH BIỆT NỀN VÀ CHỮ */
        .links-wrapper { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .link-card { 
            background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(4px); padding: 16px 20px; border-radius: 8px; 
            text-decoration: none; display: flex; align-items: center; border: 1px solid var(--border-color); 
            transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; font-size: 0.95rem; 
        }
        .link-card::before { content: '$ '; font-weight: 700; margin-right: 8px; color: var(--neon-green); }
        
        .link-card:hover { transform: translateX(5px); border-color: var(--neon-green); background: rgba(13, 17, 23, 0.9); }
        
        /* ICON GIỮ MÀU GỐC */
        .link-card i { 
            font-size: 1.2rem; margin-right: 12px; transition: transform 0.3s; width: 24px; text-align: center;
        }
        .link-card:hover i { transform: scale(1.2); }
        
        .link-card.ios i { color: #ffffff; }
        .link-card.android i { color: #3ddc84; }
        .link-card.windows i { color: #00a4ef; }
        .link-card.hack i { color: #ff4444; }
        .link-card.fc i { color: #2ecc71; }

        /* KHUNG NHÚNG CHAT TỐI ƯU */
        .chat-widget { width: 100%; height: 480px; margin-top: 10px; background: rgba(13, 17, 23, 0.85); border: 1px solid var(--border-color); border-radius: 8px; -webkit-overflow-scrolling: touch; }

        /* LOADING CĂN GIỮA TUYỆT ĐỐI CHÍNH XÁC */
        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999999; transition: 0.8s; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #loading-content { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .loader-spinner { width: 50px; height: 50px; margin: 0 auto; border: 4px solid var(--border-color); border-top: 4px solid var(--neon-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* NÚT ENTER VẪN GIỮ HÀO QUANG ĐỂ NỔI BẬT */
        .enter-btn { 
            display: none; padding: 15px 40px; font-size: 1.2rem; font-family: 'JetBrains Mono', monospace; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; background: transparent; transition: all 0.3s ease; 
            border: 2px solid var(--neon-green); color: var(--neon-green);
            animation: neon-pulse-glow 10s infinite ease-in-out;
        }
        @keyframes neon-pulse-glow {
            0%, 100% { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 65, 0.4); }
            25% { border-color: #fff; color: #fff; box-shadow: 0 0 40px var(--neon-green); }
            50% { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 121, 198, 0.4); }
            75% { border-color: #fff; color: #fff; box-shadow: 0 0 40px var(--neon-pink); }
        }
        .loaded #loader-wrapper { opacity: 0; visibility: hidden; pointer-events: none; }

        /* CLICK FX (NỔ 3 SÓNG & TIM BAY CHÓI LOÁ) */
        .click-ripple { position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); animation: ripple-wave 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        @keyframes ripple-wave { 0% { width: 0; height: 0; opacity: 1; border-width: 6px; } 100% { width: 220px; height: 220px; opacity: 0; border-width: 0px; } }
        .click-particle { position: fixed; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; z-index: 9999; animation: particle-explode 0.6s forwards; }
        @keyframes particle-explode { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; } }
        .click-heart { fixed; font-size: 22px; font-weight: bold; pointer-events: none; z-index: 9999; animation: heart-float 1s ease-out forwards; }
        @keyframes heart-float { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 20% { transform: translate(-50%, -80%) scale(1.3); } 100% { transform: translate(-50%, -200px) scale(1); opacity: 0; } }

        @media (max-width: 768px) { .container { max-width: 95%; padding: 20px; } h1 { font-size: 1.5rem; } .link-card { font-size: 0.85rem; } }
    </style>
</head>
<body>
    <div id="loader-wrapper">
        <div id="loading-content">
            <div class="loader-spinner"></div>
            <p class="loader-text" style="margin-top:20px;">Đang kết nối hệ thống</p>
        </div>
        <button id="enter-btn" class="enter-btn">[ CLICK TO ENTER ]</button>
    </div>

    <div class="snow-container" id="snowContainer"></div>

    <div class="container">
        <video id="bgMusic" class="card-video-bg" loop playsinline>
            <source src="https://raw.githubusercontent.com/nhicode/nhicode/refs/heads/main/IMG_1924.MOV" type="video/mp4">
        </video>

        <div class="profile">
            <img src="https://raw.githubusercontent.com/nhicode/nhicode/refs/heads/main/0A9C3596-EAD0-46A5-9C28-CCA4D7CB61CC.jpeg" class="header-icon" alt="Profile">
            <h1>Clien Roblox iOS</h1><br>
            <div class="subtitle">Developer: chisato</div>
            <div class="code-separator">/* Clien */</div>
        </div>

        <div class="links-wrapper">
            <a href="https://vuotnhanh.com/xyGk" target="_blank" class="link-card ios"><i class="fa-brands fa-apple"></i> <span class="link-text">Tải cho iOS (IPA)</span></a>
            <a href="https://vuotnhanh.com/bADq" target="_blank" class="link-card android"><i class="fa-brands fa-android"></i> <span class="link-text">Tải cho Android (APK)</span></a>
            <a href="#" onclick="alert('Windows Client đang phát triển!')" class="link-card windows"><i class="fa-brands fa-windows"></i> <span class="link-text">Tải cho Windows (EXE)</span></a>
            <a href="https://vuotnhanh.com/uNL4" target="_blank" class="link-card hack"><i class="fa-solid fa-dragon"></i> <span class="link-text">Hack Map Liên Quân (IPA)</span></a>
            <a href="https://vuotnhanh.com/xHfg" target="_blank" class="link-card fc"><i class="fa-regular fa-futbol"></i> <span class="link-text">FC Mobile VN (IPA)</span></a>
            
            <div class="code-separator">/* Kênh Chat Khu Vực (báo cáo lỗi) */</div>
            <iframe src="chat.html" class="chat-widget" frameborder="0"></iframe>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Thời gian quay vòng tròn 3 giây (3000ms)
            setTimeout(() => {
                document.getElementById('loading-content').style.display = 'none'; 
                document.getElementById('enter-btn').style.display = 'block'; 
            }, 3000); 
        });

        document.getElementById('enter-btn').addEventListener('click', () => {
            document.body.classList.add('loaded');
            try { initAudio(); playClickSound(); } catch(e) {}
            const music = document.getElementById("bgMusic");
            music.muted = false; music.play().catch(e => {});
        });

        let audioCtx = null;
        function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } if (audioCtx.state === 'suspended') { audioCtx.resume(); } }
        function playClickSound() {
            try { initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = 800; osc.type = 'sine'; gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1); } catch(e) {}
        }

        document.addEventListener('click', function(e) {
            if(e.target.id === 'enter-btn') return; 
            
            createRipple(e.clientX, e.clientY); 
            createParticles(e.clientX, e.clientY);
            
            // TIM BAY CHÓI LOÁ
            const colors = ['#00ff41', '#ff79c6', '#ffb86c'];
            const h = document.createElement('div'); h.className = 'click-heart'; h.innerHTML = '&lt;3';
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
            const color = colors[Math.floor(Math.random() * colors.length)];
            h.style.color = color;
            h.style.textShadow = `0 0 15px ${color}`; 
            document.body.appendChild(h); setTimeout(() => h.remove(), 1000);
            
            try { playClickSound(); } catch(err) {}
        });

        function createRipple(x, y) {
            const colors = ['#00ff41', '#ff79c6', '#ffb86c'];
            colors.forEach((color, index) => { 
                setTimeout(() => { 
                    const r = document.createElement('div'); r.className = 'click-ripple'; 
                    r.style.left = x + 'px'; r.style.top = y + 'px'; 
                    r.style.border = `solid ${color}`; 
                    r.style.boxShadow = `0 0 20px ${color}, inset 0 0 10px ${color}`; 
                    document.body.appendChild(r); setTimeout(() => r.remove(), 800); 
                }, index * 120); 
            });
        }
        function createParticles(x, y) {
            const colors = ['#00ff41', '#ff79c6', '#ffb86c'];
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div'); p.className = 'click-particle'; p.style.left = x + 'px'; p.style.top = y + 'px';
                const c = colors[Math.floor(Math.random() * colors.length)]; 
                p.style.backgroundColor = c; p.style.boxShadow = `0 0 10px ${c}`;
                const a = (Math.PI * 2 * i) / 12; const v = 60 + Math.random() * 60; const tx = Math.cos(a) * v; const ty = Math.sin(a) * v;
                p.style.setProperty('--tx', `${tx}px`); p.style.setProperty('--ty', `${ty}px`);
                document.body.appendChild(p); setTimeout(() => p.remove(), 600);
            }
        }

        // MƯA CODE THƯA (2 giây)
        setInterval(() => {
            const p = document.createElement('div'); p.className = 'snowflake'; p.innerHTML = ['&lt;/&gt;', '{ }', '[ ]', '( )', '<< >>'][Math.floor(Math.random() * 5)]; p.style.left = Math.random()*100+'vw'; p.style.animationDuration = Math.random() * 4 + 3 + 's';
            document.getElementById('snowContainer').appendChild(p); setTimeout(() => p.remove(), 7000);
        }, 2000);
    </script>
</body>
</html>
